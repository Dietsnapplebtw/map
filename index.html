<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Chicago Chinatown Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-container">
      <div class="app" id="app">
        <div id="map"></div>

        <aside id="info-panel">
          <!-- Mobile drag handle -->
          <div class="mobile-drag-handle" id="dragHandle">
            <div class="drag-bar"></div>
          </div>
          
          <div class="panel-header">
            <input id="searchInput" class="search-input" type="search" placeholder="Search places..." />
            <!-- Mobile close button -->
            <button class="mobile-close-btn" id="mobileCloseBtn" aria-label="Close panel">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <div class="panel-body">
            <!-- Back button (hidden by default) -->
            <div id="backButton" class="back-button" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              <span>Back</span>
            </div>

            <!-- Categories view -->
            <div id="categoryView">
              <div id="categoryList"></div>
            </div>

            <!-- Location details view (hidden by default) -->
            <div id="locationView" style="display: none;">
              <div id="locationDetails"></div>
            </div>
          </div>
        </aside>

        <!-- Toggle button - now outside the panel (desktop only) -->
        <button class="toggle-btn" id="toggleBtn" title="Collapse/expand panel" aria-label="Toggle panel">
          <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <!-- Mobile: Backdrop overlay -->
        <div class="panel-backdrop" id="panelBackdrop"></div>

        <!-- Mobile: Floating Action Button to open panel -->
        <button class="mobile-fab" id="mobileFab" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <script>
      // Chinatown bounds (approx)
      const CHINATOWN_BOUNDS = { north: 41.8605, south: 41.8472, west: -87.6478, east: -87.6231};
      const CHINATOWN_CENTER = { lat: 41.8530, lng: -87.6330 };
      const MIN_ZOOM = 1, MAX_ZOOM = 26;

      // Map style: hide business POIs, keep public ones and transit
      const MAP_STYLE = [
        { featureType: "poi.business", stylers: [{ visibility: "off" }] },
        { featureType: "administrative", elementType: "labels", stylers: [{ visibility: "off" }] }
      ];

      // Category config with colors and SVG icons (used for markers and sidebar headers)
      const CATEGORY_ORDER = [
        { id: "recommended",   label: "Recommended",   colorClass: "c-recommended",  color: "#f5c518",
          iconPath: "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" },
        { id: "attractions",   label: "Attractions",   colorClass: "c-attractions",  color: "#8e44ad",
          iconPath: "M12 15.2c1.77 0 3.2-1.43 3.2-3.2S13.77 8.8 12 8.8 8.8 10.23 8.8 12s1.43 3.2 3.2 3.2zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z" },
        { id: "restaurants",   label: "Restaurants",   colorClass: "c-restaurants",  color: "#e74c3c",
          iconPath: "M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z" },
        { id: "hotels",        label: "Hotels",        colorClass: "c-hotels",       color: "#e67e22",
          iconPath: "M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z" },
        { id: "beverage",      label: "Beverage",      colorClass: "c-beverage",     color: "#795548",
          iconPath: "M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z" },
        { id: "dessert",       label: "Dessert",       colorClass: "c-dessert",      color: "#ff6b9d",
          iconPath: "M12 3C8 3 4 5 4 9c0 2.39 1.28 4.37 3.25 5.47L6 22h12l-1.25-7.53C18.72 13.37 20 11.39 20 9c0-4-4-6-8-6zm0 2c3.31 0 6 1.79 6 4s-2.69 4-6 4-6-1.79-6-4 2.69-4 6-4z" },
        { id: "stores",        label: "Stores",        colorClass: "c-stores",       color: "#2980b9",
          iconPath: "M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2h-4c0-1.1.9-2 2-2zm6 16H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v12z" },
        { id: "salon",         label: "Salon",         colorClass: "c-salon",        color: "#9c27b0",
          iconPath: "M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zM6 8c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm0 12c-1.1 0-2-.89-2-2s.9-2 2-2 2 .89 2 2-.9 2-2 2zm6-7.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3z" },
        { id: "beauty",        label: "Beauty",        colorClass: "c-beauty",       color: "#ec407a",
          iconPath: "M19 9l1.25-2.75L23 5l-2.75-1.25L19 1l-1.25 2.75L15 5l2.75 1.25L19 9zm-7.5.5L9 4 6.5 9.5 1 12l5.5 2.5L9 20l2.5-5.5L17 12l-5.5-2.5zM19 15l-1.25 2.75L15 19l2.75 1.25L19 23l1.25-2.75L23 19l-2.75-1.25L19 15z" },
        { id: "super market",  label: "Supermarket",   colorClass: "c-supermarket",  color: "#4caf50",
          iconPath: "M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.1 17 7 17h11v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H16c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20.5 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" },
        { id: "entertainment", label: "Entertainment", colorClass: "c-entertainment",color: "#ff5722",
          iconPath: "M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-9 13H9v-2h2v2zm0-4H9V7h2v4zm4 4h-2v-2h2v2zm0-4h-2V7h2v4z" },
        { id: "transit",       label: "Public Transit",colorClass: "c-transit",      color: "#16a085",
          iconPath: "M12 2c-4 0-8 .5-8 4v9.5C4 17.43 5.57 19 7.5 19L6 20.5v.5h12v-.5L16.5 19c1.93 0 3.5-1.57 3.5-3.5V6c0-3.5-3.58-4-8-4zM7.5 17c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm3.5-6H6V6h5v5zm5.5 6c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6h-5V6h5v5z" },
        { id: "parks",         label: "Parks",         colorClass: "c-parks",        color: "#2ecc71",
          iconPath: "M13 16h-2v-4.59L7.5 8H5.36L9 4.83V2h2v3.17L14.64 8H12.5l-3.5 3.41V16h-2zm-1 2H6l-1 4h12l-1-4h-4zm1-12.17V2h-2v1.83C8.52 4.22 7 5.98 7 8c0 2.76 2.24 5 5 5s5-2.24 5-5c0-2.02-1.52-3.78-4-4.17z" },
        { id: "parking lots",  label: "Parking Lots",  colorClass: "c-parkinglots",  color: "#607d8b",
          iconPath: "M13 3H6v18h4v-6h3c3.31 0 6-2.69 6-6s-2.69-6-6-6zm.2 8H10V7h3.2c1.1 0 2 .9 2 2s-.9 2-2 2z" }
      ];
      const CATEGORY_BY_ID = Object.fromEntries(CATEGORY_ORDER.map(c => [c.id, c]));

      // Places data will be loaded from external file
      let places = [];

      // Map + markers
      let map;
      const markersById = new Map();
      let currentTooltip = null;

      // Creates an HTML pin element for AdvancedMarkerElement
      function makeMarkerContent(color, iconPath) {
        const el = document.createElement("div");
        el.style.cssText = "width:32px;height:40px;position:relative;cursor:pointer;";
        el.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 40" width="32" height="40">
            <path d="M16 2C9.373 2 4 7.373 4 14c0 9 12 26 12 26S28 23 28 14C28 7.373 22.627 2 16 2z"
                  fill="${color}" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>
          </svg>
          <div style="position:absolute;top:7px;left:50%;transform:translateX(-50%);line-height:0;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="white">
              <path d="${iconPath}"/>
            </svg>
          </div>
        `;
        return el;
      }

      function primaryCategoryId(place) {
        return place.categories && place.categories.length ? place.categories[0] : "attractions";
      }

      // Tooltip functions - simplified approach
      function showTooltip(marker, text) {
        hideTooltip();
        
        const tooltip = document.createElement('div');
        tooltip.className = 'marker-tooltip';
        tooltip.textContent = text;
        tooltip.style.visibility = 'hidden'; // Start hidden to measure size
        document.getElementById('map').appendChild(tooltip);
        
        // Use OverlayView for proper positioning
        const overlay = new google.maps.OverlayView();
        
        overlay.onAdd = function() {
          const panes = this.getPanes();
          panes.overlayMouseTarget.appendChild(tooltip);
        };
        
        overlay.draw = function() {
          const projection = this.getProjection();
          const position = marker.position ? new google.maps.LatLng(marker.position.lat, marker.position.lng) : null;
          
          if (projection && position) {
            const pixelPosition = projection.fromLatLngToDivPixel(position);
            
            if (pixelPosition) {
              tooltip.style.left = pixelPosition.x + 'px';
              tooltip.style.top = (pixelPosition.y - 40) + 'px'; 
              tooltip.style.visibility = 'visible';
            }
          }
        };

        overlay.onRemove = function() {
          if (tooltip && tooltip.parentNode) {
            tooltip.parentNode.removeChild(tooltip);
          }
        };

        overlay.setMap(map);
        currentTooltip = { element: tooltip, overlay: overlay };
      }

      function hideTooltip() {
        if (currentTooltip) {
          if (currentTooltip.overlay) {
            currentTooltip.overlay.setMap(null);
          }
          currentTooltip = null;
        }
      }

      // Load places data from external JSON file
      async function loadPlacesData() {
        try {
          const cacheBuster = Date.now();
          const response = await fetch(`places-data.json?v=${cacheBuster}`);
          const data = await response.json();
          places = data.places;
          console.log('Loaded', places.length, 'places');
        } catch (error) {
          console.error('Error loading places data:', error);
        }
      }

      async function initMap() {
        // Load places data first
        await loadPlacesData();
        
        map = new google.maps.Map(document.getElementById("map"), {
          center: CHINATOWN_CENTER,
          zoom: 15,
          minZoom: MIN_ZOOM,
          maxZoom: MAX_ZOOM,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true, // Enable built-in fullscreen control
          fullscreenControlOptions: {
            position: google.maps.ControlPosition.LEFT_BOTTOM
          },
          keyboardShortcuts: false, // Disable keyboard navigation button
          panControl: false, // Disable pan arrow buttons
          zoomControl: false, // Disable zoom +/- buttons
          cameraControl: false, // Disable camera/pan controls (newer API)
          clickableIcons: false,
          styles: MAP_STYLE,
          restriction: { latLngBounds: CHINATOWN_BOUNDS, strictBounds: true },
          mapId: "a935a770417c51b0a7d99cd2"
        });

        // Transit overlay
        const transitLayer = new google.maps.TransitLayer();
        transitLayer.setMap(map);

        // Build markers using AdvancedMarkerElement with SVG pin icons
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        places.forEach(place => {
          const catId = primaryCategoryId(place);
          const cfg = CATEGORY_BY_ID[catId] || CATEGORY_BY_ID.attractions;

          const markerEl = makeMarkerContent(cfg.color, cfg.iconPath);

          const marker = new AdvancedMarkerElement({
            position: place.position,
            map,
            title: place.name,
            content: markerEl
          });

          marker.addListener("click", () => focusPlace(place.id));
          markerEl.addEventListener("mouseenter", () => showTooltip(marker, place.name));
          markerEl.addEventListener("mouseleave", () => hideTooltip());

          markersById.set(place.id, marker);
        });
        
        // Panel interactions
        setupPanel();
        renderCategories(); // initial render

        // Auto-open bottom sheet on mobile when page loads
        if (isMobile()) {
          openMobilePanel();
        }

        // Hide tooltip when map is moved or clicked
        map.addListener("drag", hideTooltip);
        map.addListener("zoom_changed", hideTooltip);
        map.addListener("click", hideTooltip);
      }

      // Panel toggle, search, rendering
      // Mobile detection helper - uses matchMedia for reliable detection with DevTools
      function isMobile() {
        return window.matchMedia("(max-width: 768px)").matches;
      }

      // ============ MOBILE PANEL FUNCTIONS (Global scope) ============
      function openMobilePanel() {
        const appEl = document.getElementById("app");
        appEl.classList.add("panel-open");
        appEl.classList.remove("panel-peek");
        document.body.style.overflow = "hidden"; // Prevent background scroll
      }

      function closeMobilePanel() {
        const appEl = document.getElementById("app");
        appEl.classList.remove("panel-open", "panel-peek");
        document.body.style.overflow = "";
        document.getElementById("info-panel").style.transform = ""; // Reset any drag transform
      }

      function setupPanel() {
        const appEl = document.getElementById("app");
        const toggleBtn = document.getElementById("toggleBtn");
        const searchInput = document.getElementById("searchInput");
        const backButton = document.getElementById("backButton");
        
        // Mobile elements
        const panel = document.getElementById("info-panel");
        const dragHandle = document.getElementById("dragHandle");
        const mobileCloseBtn = document.getElementById("mobileCloseBtn");
        const mobileFab = document.getElementById("mobileFab");
        const backdrop = document.getElementById("panelBackdrop");

        // Desktop toggle
        toggleBtn.addEventListener("click", () => {
          appEl.classList.toggle("collapsed");
        });

        // Search input
        searchInput.addEventListener("input", () => {
          renderCategories(searchInput.value.trim().toLowerCase());
        });

        // Back button
        backButton.addEventListener("click", () => {
          showCategoryView();
        });

        // ============ MOBILE BOTTOM SHEET EVENTS ============
        
        // FAB click - open panel
        mobileFab.addEventListener("click", openMobilePanel);

        // Close button click
        mobileCloseBtn.addEventListener("click", closeMobilePanel);

        // Backdrop click - close panel
        backdrop.addEventListener("click", closeMobilePanel);

        // ============ SWIPE GESTURE HANDLING ============
        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        const SWIPE_THRESHOLD = 100; // pixels to trigger close

        function handleTouchStart(e) {
          if (!isMobile()) return;
          startY = e.touches[0].clientY;
          isDragging = true;
          panel.classList.add("dragging");
        }

        function handleTouchMove(e) {
          if (!isDragging || !isMobile()) return;
          
          currentY = e.touches[0].clientY;
          const deltaY = currentY - startY;
          
          // Only allow dragging down (positive deltaY)
          if (deltaY > 0) {
            panel.style.transform = `translateY(${deltaY}px)`;
          }
        }

        function handleTouchEnd(e) {
          if (!isDragging || !isMobile()) return;
          
          isDragging = false;
          panel.classList.remove("dragging");
          panel.style.transform = ""; // Reset inline style
          
          const deltaY = currentY - startY;
          
          // If swiped down enough, close the panel
          if (deltaY > SWIPE_THRESHOLD) {
            closeMobilePanel();
          }
          
          // Reset values
          startY = 0;
          currentY = 0;
        }

        // Attach touch events to drag handle
        dragHandle.addEventListener("touchstart", handleTouchStart, { passive: true });
        dragHandle.addEventListener("touchmove", handleTouchMove, { passive: true });
        dragHandle.addEventListener("touchend", handleTouchEnd);

        // Also allow swiping from panel header area
        const panelHeader = document.querySelector(".panel-header");
        panelHeader.addEventListener("touchstart", handleTouchStart, { passive: true });
        panelHeader.addEventListener("touchmove", handleTouchMove, { passive: true });
        panelHeader.addEventListener("touchend", handleTouchEnd);

        // Handle window resize - close mobile panel if switching to desktop
        window.addEventListener("resize", () => {
          if (!isMobile()) {
            appEl.classList.remove("panel-open", "panel-peek");
            document.body.style.overflow = "";
            panel.style.transform = "";
          }
        });
      }

      function showCategoryView() {
        document.getElementById("categoryView").style.display = "block";
        document.getElementById("locationView").style.display = "none";
        document.getElementById("backButton").style.display = "none";
        document.getElementById("searchInput").style.display = "block";
      }

      function showLocationView() {
        document.getElementById("categoryView").style.display = "none";
        document.getElementById("locationView").style.display = "block";
        document.getElementById("backButton").style.display = "flex";
        document.getElementById("searchInput").style.display = "none";
      }

      function matchQuery(place, q) {
        if (!q) return true;
        const hay = (place.name + " " + (place.description || "") + " " + (place.tags || []).join(" ")).toLowerCase();
        return hay.includes(q);
      }

      function renderCategories(query = "") {
        const container = document.getElementById("categoryList");
        container.innerHTML = "";

        CATEGORY_ORDER.forEach(cat => {
          const inCat = places.filter(p => p.categories.includes(cat.id) && matchQuery(p, query));
          
          // Skip empty categories when searching
          if (query && inCat.length === 0) return;

          const section = document.createElement("section");
          section.className = "cat-section";
          section.dataset.cat = cat.id;

          const header = document.createElement("div");
          header.className = "cat-header";
          header.innerHTML = `
            <span class="cat-left">
              <span class="cat-icon" title="${cat.label}" style="width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:${cat.color};flex-shrink:0;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="white"><path d="${cat.iconPath}"/></svg>
              </span>
              <span>${cat.label}</span>
            </span>
            <span style="display: flex; align-items: center; gap: 8px;">
              <span class="cat-count">${inCat.length}</span>
              <svg class="cat-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </span>
          `;
          
          // Add click handler to toggle category
          header.addEventListener("click", () => {
            const isExpanded = section.classList.contains("expanded");
            section.classList.toggle("expanded", !isExpanded);
          });
          
          section.appendChild(header);

          const list = document.createElement("ul");
          list.className = "cat-list";

          if (!query && inCat.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "No items yet.";
            section.appendChild(empty);
          } else {
            inCat.forEach(place => {
              const li = document.createElement("li");
              li.className = "cat-item";
              li.dataset.id = place.id;

              const primary = primaryCategoryId(place);
              const colorClass = (CATEGORY_BY_ID[primary] || CATEGORY_BY_ID.attractions).colorClass;

              li.innerHTML = `
                <span class="dot ${colorClass}"></span>
                <span>${place.name}</span>
              `;
              li.addEventListener("click", (e) => {
                e.stopPropagation(); // Prevent category toggle when clicking on item
                focusPlace(place.id);
              });
              list.appendChild(li);
            });
          }

          section.appendChild(list);
          container.appendChild(section);
        });
      }

      function focusPlace(placeId) {
        const place = places.find(p => p.id === placeId);
        if (!place) return;
        const marker = markersById.get(placeId);

        map.panTo(place.position);
        if (map.getZoom() < 16) map.setZoom(16);

        if (marker) {
          // Hide any existing tooltip
          hideTooltip();
        }

        showDetails(place);

        // Ensure panel open - handle both desktop and mobile
        const appEl = document.getElementById("app");
        
        if (isMobile()) {
          // Mobile: open the bottom sheet
          openMobilePanel();
        } else {
          // Desktop: remove collapsed state
          if (appEl.classList.contains("collapsed")) {
            appEl.classList.remove("collapsed");
          }
        }
      }

      function showDetails(place) {
        const details = document.getElementById("locationDetails");
        
        // Build media content with gallery

// Collect all media items (photos and videos)

// Add primary photo/video first
if (place.video) {
  mediaItems.push({ type: 'video', src: place.video, alt: place.name });
} else if (place.photo) {
  mediaItems.push({ type: 'image', src: place.photo, alt: place.name });
}

// Add gallery items if they exist
if (place.gallery && place.gallery.length > 0) {
  place.gallery.forEach(item => {
    mediaItems.push(item);
  });
}

if (mediaItems.length > 0) {
  const mainItem = mediaItems[0];
  
  // Main media display
  if (mainItem.type === 'video') {
    mediaHtml = `
      <div class="media">
        <iframe id="mainMedia" src="${mainItem.src}" allowfullscreen></iframe>
    `;
  } else {
    mediaHtml = `
      <div class="media">
        <img id="mainMedia" src="${mainItem.src}" alt="${mainItem.alt || place.name}" />
    `;
  }
  
  // Add thumbnail gallery if more than one item
  if (mediaItems.length > 1) {
    mediaHtml += `
      <div class="media-gallery">
        <div class="gallery-thumbnails">
    `;
    
    mediaItems.forEach((item, index) => {
      const isActive = index === 0 ? 'active' : '';
      const thumbSrc = item.type === 'video' ? 
        `https://img.youtube.com/vi/${extractYouTubeId(item.src)}/mqdefault.jpg` : 
        item.src;
      
      mediaHtml += `
        <div class="thumbnail ${isActive}" data-index="${index}" data-type="${item.type}" data-src="${item.src}">
          <img src="${thumbSrc}" alt="${item.alt || place.name}" />
          ${item.type === 'video' ? '<div class="play-icon"></div>' : ''}
        </div>
      `;
    });
    
    mediaHtml += `
        </div>
      </div>
    `;
  }
  
  mediaHtml += `</div>`;
}

        // Build address section
        let addressHtml = "";
        if (place.address) {
          addressHtml = `
            <div class="address">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

            </div>
          `;

        // Build action buttons
        let actionsHtml = `<div class="actions">`;
        
        // Directions button (always show)
        const lat = place.position.lat;
        const lng = place.position.lng;
        const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
        
        actionsHtml += `

              <path d="M3 11l19-9-9 19-2-8-8-2z"></path>

          </a>

        // More Info button (if website exists)
        if (place.website) {

                <circle cx="12" cy="12" r="10"></circle>
                <path d="M2 12h20"></path>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
              </svg>
              More Info
            </a>
          `;
        }

        actionsHtml += `</div>`;

        // Assemble final HTML - media first, then title, address, description, actions
        details.innerHTML = `

          <h2>${place.name}</h2>
          ${addressHtml}
          <p>${place.description || ""}</p>
          ${actionsHtml}
        `;

        // Switch to location view
        showLocationView();

        setupGallery();
      }
      function extractYouTubeId(url) {
  const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
  return match ? match[1] : '';
}

function setupGallery() {
  const thumbnails = document.querySelectorAll('.thumbnail');
  if (thumbnails.length <= 1) return;
  
  thumbnails.forEach(thumb => {
    thumb.addEventListener('click', () => {
      // Remove active class from all thumbnails
      thumbnails.forEach(t => t.classList.remove('active'));
      
      // Add active class to clicked thumbnail
      thumb.classList.add('active');
      
      // Update main media
      const mainMedia = document.getElementById('mainMedia');
      const type = thumb.dataset.type;
      const src = thumb.dataset.src;
      
      if (type === 'video') {
        // Replace with iframe
        const iframe = document.createElement('iframe');
        iframe.id = 'mainMedia';
        iframe.src = src;
        iframe.allowFullscreen = true;
        mainMedia.parentNode.replaceChild(iframe, mainMedia);
      } else {
        // Replace with img
        const img = document.createElement('img');
        img.id = 'mainMedia';
        img.src = src;
        img.alt = thumb.querySelector('img').alt;
        mainMedia.parentNode.replaceChild(img, mainMedia);
      }
    });
  });
}
